name: Publish npm package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Commit SHA, branch, or tag to publish from"
        required: true
      version:
        description: "Exact npm version to publish, for example 0.1.10-beta.1"
        required: true
      npm_tag:
        description: "npm dist-tag to publish with"
        required: true
        default: "next"
      create_github_release:
        description: "Create or update the matching GitHub release"
        required: true
        default: "true"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install npm package
        run: npm ci

      - name: Test package
        run: npm test

      - name: Prepare npm release metadata
        id: release
        shell: bash
        run: |
          base_version="$(node -p "require('./package.json').version")"
          package_name="$(node -p "require('./package.json').name")"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            tag="${{ inputs.npm_tag }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ "$version" == *-* ]]; then
              tag="next"
            else
              tag="latest"
            fi
          else
            version="$(node npm/scripts/resolve-prerelease-version.js --package "$package_name" --base "$base_version" --id beta)"
            tag="next"
          fi
          if [[ "$tag" == "latest" && "$version" == *-* ]]; then
            echo "Refusing to publish prerelease version $version with npm dist-tag latest." >&2
            exit 1
          fi
          node npm/scripts/set-package-version.js "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this npm version already exists
        id: npm-version
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-version.outputs.published != 'true'
        run: npm publish --access public --provenance --tag "${{ steps.release.outputs.tag }}"

      - name: Skip existing npm version
        if: steps.npm-version.outputs.published == 'true'
        run: echo "npm version ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists; skipping publish."

      - name: Create or update GitHub release
        if: github.event_name != 'workflow_dispatch' || inputs.create_github_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${{ steps.release.outputs.version }}"
          npm_tag="${{ steps.release.outputs.tag }}"
          tag_name="v${version}"
          target="$(git rev-parse HEAD)"
          notes="npm package: \`${{ steps.package.outputs.name }}@${version}\`
npm dist-tag: \`${npm_tag}\`
workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          create_release_args=()
          edit_release_args=()
          if [[ "$version" == *-* ]]; then
            create_release_args=(--prerelease --latest=false)
            edit_release_args=(--prerelease)
          fi
          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release edit "$tag_name" --title "$tag_name" --notes "$notes" "${edit_release_args[@]}"
          else
            gh release create "$tag_name" --target "$target" --title "$tag_name" --notes "$notes" "${create_release_args[@]}"
          fi
